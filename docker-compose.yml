services:
  db:
    # PostGIS-fähiges Postgres (Phase 7: Lauf-Tracks als geometry(LineString,4326)).
    # imresamu/postgis ist der Multi-Arch-Fork (amd64 + arm64) – das offizielle
    # postgis/postgis-Image hat kein arm64-Manifest und scheitert auf Apple
    # Silicon UND auf dem Raspberry Pi 4 (beide arm64).
    image: imresamu/postgis:16-3.5
    container_name: dashboard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - dashboard-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dashboard-db-data: